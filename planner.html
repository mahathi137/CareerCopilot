<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner — CareerCopilot</title>
<link rel="stylesheet" href="css/designsystem.css">
<link rel="stylesheet" href="css/appshell.css">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/chatbot.css">
</head>
<body>
<div class="app">

  <div class="sidebar-overlay"></div>
  <aside class="sidebar">
    <a href="index.html" class="brand"><span class="brand-mark">CC</span> CareerCopilot</a>
    <nav class="side-nav">
      <a href="dashboard.html" class="side-link"><span class="ic">🏠</span> Dashboard</a>
      <a href="coding.html" class="side-link"><span class="ic">💻</span> Coding Practice</a>
      <a href="aptitude.html" class="side-link"><span class="ic">🧮</span> Aptitude Hub</a>
      <a href="interview.html" class="side-link"><span class="ic">🎤</span> Interview Prep</a>
      <a href="resume.html" class="side-link"><span class="ic">📄</span> Resume Master</a>
      <a href="companies.html" class="side-link"><span class="ic">🏢</span> Company Prep</a>
      <a href="planner.html" class="side-link active"><span class="ic">🗓️</span> Study Planner</a>
      <a href="achievements.html" class="side-link"><span class="ic">🏅</span> Achievements</a>
      <a href="analytics.html" class="side-link"><span class="ic">📊</span> Analytics</a>
      <a href="settings.html" class="side-link"><span class="ic">⚙️</span> Settings</a>
    </nav>
    <div class="side-foot">
      <div class="side-user">
        <div class="avatar" id="side-avatar">AS</div>
        <div class="meta"><b id="side-name">Aman Sharma</b><span id="side-rank">Beginner Explorer</span></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="flex items-center gap-16">
        <button class="menu-toggle btn-icon">☰</button>
        <div>
          <h1>Study Planner</h1>
          <div class="topbar-sub">Organize your preparation with a structured plan</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </header>

    <div class="content">
      <!-- Settings Card -->
      <div class="card card-pad mb-6">
        <h3 style="margin-bottom: var(--space-4);">Planner Settings</h3>
        <div class="content-grid-3">
          <div class="form-group">
            <label class="form-label">Placement Date</label>
            <input type="date" class="form-input" id="placement-date">
          </div>
          <div class="form-group">
            <label class="form-label">Daily Study Hours</label>
            <select class="form-select" id="daily-hours">
              <option value="2">2 hours</option>
              <option value="3">3 hours</option>
              <option value="4" selected>4 hours</option>
              <option value="5">5 hours</option>
              <option value="6">6+ hours</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Focus Areas</label>
            <select class="form-select" id="focus-areas">
              <option value="balanced">Balanced</option>
              <option value="dsa-heavy">DSA Heavy</option>
              <option value="aptitude-heavy">Aptitude Heavy</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary mt-4" onclick="saveSettings()">Save Settings</button>
      </div>

      <!-- Weekly Plan -->
      <div class="card card-pad">
        <h3 style="margin-bottom: var(--space-4);">Weekly Study Plan</h3>
        <div class="flex-col gap-4" id="weekly-plan">
          <!-- Weekly plan will be rendered here -->
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/storage.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/main.js"></script>
<script src="js/chatbot.js"></script>
<script src="js/chatbot-ui.js"></script>
<script src="js/planner.js"></script>
</body>
</html>
